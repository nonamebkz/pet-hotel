services:
  mariadb:
    image: mariadb:10.11
    container_name: petshop-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-petshop}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - petshop_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petshop-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
    volumes:
      - ./public/uploads:/var/www/html/public/uploads
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  petshop_mariadb_data:
